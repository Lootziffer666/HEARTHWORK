};

// ── useSwipe hook ─────────────────────────────────────────
function useSwipe({onSwipeLeft,onSwipeRight,onSwipeDown,threshold=50}){
  const startX=React.useRef(null);
  const startY=React.useRef(null);
  const handlers={
    onPointerDown:(e)=>{startX.current=e.clientX;startY.current=e.clientY;},
    onPointerUp:(e)=>{
      if(startX.current===null)return;
      const dx=e.clientX-startX.current;
      const dy=e.clientY-startY.current;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>threshold){
        if(dx>0&&onSwipeRight)onSwipeRight();
        if(dx<0&&onSwipeLeft)onSwipeLeft();
      }
      if(dy>threshold&&Math.abs(dy)>Math.abs(dx)&&onSwipeDown)onSwipeDown();
      startX.current=null;startY.current=null;
    },
  };
  return handlers;
}

const BottomBar=({tabs,active,onTab})=>(
  <div style={{position:'absolute',bottom:0,left:0,right:0,background:WH,borderTop:'1px solid #E0E0E0',display:'flex',paddingBottom:16,minHeight:48,flexShrink:0}}>
    {tabs.map(({icon,label,id})=>(
      <button key={id} onClick={()=>onTab(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:10,gap:3,background:'none',border:'none',cursor:'pointer',minHeight:48}}>
        <i data-lucide={icon} style={{width:22,height:22,color:active===id?NAV:'#BDBDBD'}}></i>
        <span style={{fontSize:10,fontWeight:700,color:active===id?NAV:'#BDBDBD',fontFamily:"'DM Sans',sans-serif"}}>{label}</span>
      </button>
    ))}
  </div>
);

const Header=({title,back,onBack,action,dark})=>(
  <div style={{background:dark?'#161b22':NAV,padding:'0 16px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
    {back?<button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.8)',display:'flex',alignItems:'center',gap:4,fontSize:14,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}><i data-lucide="chevron-left" style={{width:18,height:18}}></i>{back}</button>:<div style={{width:40}}></div>}
    <span style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:17,color:WH}}>{title}</span>
    {action?<button style={{background:'none',border:'none',cursor:'pointer',color:ORG,fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{action}</button>:<div style={{width:40}}></div>}
  </div>
);

    {id:3,img:img.children,title:'Golden Hour Chasing',cat:'Life',read:'5 min'},
    {id:4,img:img.hyacinth,title:'Grape Hyacinth',cat:'Nature',read:'2 min'},

  const swipeHandlers=useSwipe({onSwipeRight:()=>setDetail(null)});

  const handleScrollPointerDown=(e)=>{pullStart.current=e.clientY;};
  const handleScrollPointerMove=(e)=>{
    if(pullStart.current!==null){
      const dy=e.clientY-pullStart.current;
      if(dy>0)setPullY(Math.min(dy,80));
    }
  };
  const handleScrollPointerUp=()=>{
    if(pullY>60&&!refreshing){
      setRefreshing(true);
      setTimeout(()=>{setRefreshing(false);setPullY(0);},1000);
    } else {setPullY(0);}
    pullStart.current=null;
  };

  if(detail)return(
    <div {...swipeHandlers} style={{height:'100%',display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <Header title="" back="Feed" onBack={()=>setDetail(null)}/>
      <div style={{flex:1,overflowY:'auto'}}>
        <img src={detail.img} alt="" style={{width:'100%',height:200,objectFit:'cover',display:'block'}}/>
        <div style={{padding:'20px 16px'}}>
          <span style={{background:ORG,color:WH,fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:999,textTransform:'uppercase',letterSpacing:'0.06em'}}>{detail.cat}</span>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:24,fontWeight:900,color:NAV,marginTop:10,marginBottom:8,lineHeight:1.2}}>{detail.title}</div>

        </div>
      </div>
      <BottomBar tabs={tabs} active={tab} onTab={t=>{setTab(t);setDetail(null);}}/>
    </div>
  );
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{background:NAV,padding:'12px 16px 16px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:20,color:WH}}>COZY<span style={{color:ORG}}>-</span>COOL</div>
          <i data-lucide="bell" style={{width:20,height:20,color:'rgba(255,255,255,0.7)'}}></i>
        </div>
        <div onClick={()=>setSearchOpen(true)} style={{background:'rgba(255,255,255,0.12)',borderRadius:8,padding:'8px 12px',display:'flex',gap:8,alignItems:'center',cursor:'text',transition:'all 300ms cubic-bezier(0.34,1.56,0.64,1)'}}>
          <i data-lucide="search" style={{width:15,height:15,color:'rgba(255,255,255,0.5)'}}></i>
          <span style={{fontSize:13,color:'rgba(255,255,255,0.4)',fontFamily:"'DM Sans',sans-serif"}}>Search stories…</span>
        </div>
        {searchOpen&&<div style={{marginTop:8,background:'rgba(255,255,255,0.15)',borderRadius:8,padding:'8px 12px',display:'flex',gap:8,alignItems:'center',animation:'fadeUp 200ms ease'}}>
          <i data-lucide="search" style={{width:15,height:15,color:ORG}}></i>
          <input autoFocus onBlur={()=>setSearchOpen(false)} placeholder="Search stories…" style={{background:'none',border:'none',outline:'none',flex:1,fontSize:13,color:WH,fontFamily:"'DM Sans',sans-serif"}}/>
          <button onClick={()=>setSearchOpen(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:16'}}>×</button>
        </div>}
      </div>
      <div
        style={{flex:1,overflowY:'auto',paddingBottom:72}}
        onPointerDown={handleScrollPointerDown}
        onPointerMove={handleScrollPointerMove}
        onPointerUp={handleScrollPointerUp}
      >
        {(refreshing||pullY>20)&&<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,padding:'10px 0',color:ORG,fontSize:12,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>
          <span style={{display:'inline-block',animation:refreshing?'pullSpin 0.6s linear infinite':undefined}}>↻</span>
          {refreshing?'Refreshing…':'Pull to refresh'}
        </div>}
        <div style={{transform:`translateY(${refreshing?0:Math.max(0,pullY-20)}px)`,transition:refreshing?'transform 300ms':undefined}}>
          <div style={{position:'relative'}} onClick={()=>setDetail(posts[0])}>
            <img src={posts[0].img} alt="" style={{width:'100%',height:190,objectFit:'cover',display:'block'}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 30%,rgba(13,40,71,0.85))'}}></div>

            {posts.slice(1).map(p=>(
              <div key={p.id} onClick={()=>setDetail(p)} style={{display:'flex',gap:12,marginBottom:14,cursor:'pointer'}}>
                <img src={p.img} alt="" style={{width:72,height:56,objectFit:'cover',borderRadius:4,flexShrink:0}}/>
                <div style={{flex:1}}><span style={{fontSize:10,fontWeight:700,color:ORG,textTransform:'uppercase'}}>{p.cat}</span><div style={{fontSize:14,fontWeight:700,color:NAV,lineHeight:1.3,marginTop:2}}>{p.title}</div><div style={{fontSize:11,color:'#BDBDBD',marginTop:2}}>{p.read} read</div></div>
              </div>
            ))}

        </div>
      </div>
      <BottomBar tabs={tabs} active={tab} onTab={setTab}/>
    </div>
  );
};

    {id:3,user:'Anya B.',handle:'@anyabloom',avatar:img.underwater,img:img.daisy,caption:'The macro world is endlessly fascinating.',likes:213,time:'1d'},
  ];
  const tabs=[{id:'feed',icon:'home',label:'Feed'},{id:'discover',icon:'compass',label:'Discover'},{id:'create',icon:'plus-circle',label:'Post'},{id:'alerts',icon:'bell',label:'Alerts'},{id:'me',icon:'user',label:'Me'}];

  const handleScrollPointerDown=(e)=>{pullStart.current=e.clientY;};
  const handleScrollPointerMove=(e)=>{if(pullStart.current!==null){const dy=e.clientY-pullStart.current;if(dy>0)setPullY(Math.min(dy,80));}};
  const handleScrollPointerUp=()=>{if(pullY>60&&!refreshing){setRefreshing(true);setTimeout(()=>{setRefreshing(false);setPullY(0);},1000);}else{setPullY(0);}pullStart.current=null;};

  const postSwipe=(id)=>useSwipe({onSwipeLeft:()=>setSwiped(s=>({...s,[id]:true})),onSwipeRight:()=>setSwiped(s=>({...s,[id]:false}))});

  const startLongPress=(postId)=>{longPressTimer.current=setTimeout(()=>setActionSheet(postId),500);};
  const cancelLongPress=()=>{if(longPressTimer.current)clearTimeout(longPressTimer.current);};

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{background:WH,padding:'10px 16px',borderBottom:'1px solid #E0E0E0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:20,color:NAV}}>COZY<span style={{color:ORG}}>-</span>COOL</div>
        <div style={{display:'flex',gap:12}}><i data-lucide="search" style={{width:20,height:20,color:'#828282'}}></i><i data-lucide="send" style={{width:20,height:20,color:'#828282'}}></i></div>
      </div>
      <div
        style={{flex:1,overflowY:'auto',paddingBottom:72}}
        onPointerDown={handleScrollPointerDown}
        onPointerMove={handleScrollPointerMove}
        onPointerUp={handleScrollPointerUp}
      >
        {(refreshing||pullY>20)&&<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,padding:'10px 0',color:ORG,fontSize:12,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>
          <span style={{display:'inline-block',animation:refreshing?'pullSpin 0.6s linear infinite':undefined}}>↻</span>
          {refreshing?'Refreshing…':'Pull to refresh'}

        {posts.map(p=>{
          const swipeLeft=()=>setSwiped(s=>({...s,[p.id]:true}));
          const swipeRight=()=>setSwiped(s=>({...s,[p.id]:false}));
          const swipeH=useSwipe({onSwipeLeft:swipeLeft,onSwipeRight:swipeRight});
          return(
            <div key={p.id} style={{position:'relative',marginBottom:6,overflow:'hidden'}}>

  ]);
  const [input,setInput]=React.useState('');
  const [typing,setTyping]=React.useState(false);
  const [tab,setTab]=React.useState('chat');
  const replyIdx=React.useRef(0);
  const scrollRef=React.useRef(null);
  React.useEffect(()=>{lucide.createIcons();});
  React.useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs,typing]);

  const REPLIES=[
    "The spring easing (cubic-bezier(0.34,1.56,0.64,1)) is our signature — a tiny playful bounce for badge pops, CTA hover, and toggle knobs :)",
    "Typography: Nunito 900 for display/hero (the cozy side), DM Sans for UI and body (the cool side). They balance each other perfectly.",
    "Off-white #F8F6F2 is the default page background — warmer than pure white, easier on the eyes. Dark mode flips to the primary navy.",

    "Cards use 4px border-radius and a 0 2px 8px shadow. On hover they lift 3px and the shadow deepens. Simple, satisfying.",
  ];

  const send=()=>{
    if(!input.trim())return;
    const userMsg={id:Date.now(),role:'user',text:input};
    setMsgs(m=>[...m,userMsg]);
    setInput('');
    setTyping(true);
    const idx=replyIdx.current;

    setTimeout(()=>{
      setTyping(false);
      setMsgs(m=>[...m,{id:Date.now()+1,role:'ai',text:REPLIES[idx]}]);

        <div style={{flex:1}}>

          <div key={m.id} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:8}}>
            {m.role==='ai'&&(
              <div style={{width:28,height:28,borderRadius:'50%',background:ORG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,color:WH,fontFamily:"'Nunito',sans-serif",flexShrink:0,alignSelf:'flex-end'}}>CC</div>

            </div>
            {f.children&&f.children.map((c,j)=>(
              <div key={j} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px 9px 38px',borderBottom:'1px solid #2d2d2d',cursor:'pointer'}}>
                <i data-lucide="file" style={{width:14,height:14,color:'#555'}}></i>
                <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:'#828282'}}>{c}</span>
              </div>
            ))}
          </div>
        ))}
      </div>}
      {tab==='code'&&<div style={{flex:1,overflowY:'auto',paddingBottom:72,overflowX:'auto'}}>
        <div style={{minWidth:'max-content',padding:'12px 0'}}>
          {codeLines.map(l=>(
            <div key={l.n} style={{display:'flex',gap:0,lineHeight:'20px',fontSize:12,fontFamily:"'DM Mono',monospace"}}>
              <span style={{width:36,textAlign:'right',paddingRight:16,color:'rgba(255,255,255,0.2)',userSelect:'none',flexShrink:0}}>{l.n}</span>
              <span style={{color:hColor[l.h]||'#d4d4d4',whiteSpace:'pre'}}>{l.t}</span>
            </div>
          ))}
        </div>
      </div>}
      {tab==='terminal'&&<div style={{flex:1,display:'flex',flexDirection:'column',paddingBottom:72}}>
        <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:2}}>
          {termHistory.map((l,i)=>(
            <div key={i} style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:l.startsWith('$')?ORG:l.startsWith('>')?"#9cdcfe":'rgba(255,255,255,0.7)',lineHeight:'18px'}}>{l}</div>
          ))}
        </div>
        <div style={{padding:'8px 14px',background:'#252526',borderTop:'1px solid #333',display:'flex',alignItems:'center',gap:8}}>
          <span style={{color:ORG,fontFamily:"'DM Mono',monospace",fontSize:12}}>$</span>
          <input value={termInput} onChange={e=>setTermInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&termInput.trim()){setTermHistory(h=>[...h,`$ ${termInput}`,'Command not found.']);setTermInput('');}}} style={{flex:1,background:'none',border:'none',outline:'none',fontFamily:"'DM Mono',monospace",fontSize:12,color:'rgba(255,255,255,0.85)'}}/>
        </div>
      </div>}
      {tab==='search'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingBottom:72,gap:12}}>
        <i data-lucide="search" style={{width:36,height:36,color:'rgba(255,255,255,0.15)'}}></i>
        <span style={{color:'rgba(255,255,255,0.3)',fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Search across files…</span>
        <input placeholder="Type to search…" style={{width:'80%',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:4,padding:'10px 14px',fontSize:13,color:'rgba(255,255,255,0.8)',outline:'none',fontFamily:"'DM Mono',monospace"}}/>
      </div>}
      <BottomBar tabs={tabs} active={tab} onTab={setTab}/>
    </div>
  );
};

// ── App root ──────────────────────────────────────────────
const KITS=[
  {id:'lifestyle',label:'Lifestyle'},
  {id:'shop',label:'E-Commerce'},
  {id:'social',label:'Social'},
  {id:'github',label:'GitHub'},
  {id:'chatbot',label:'Chatbot'},
  {id:'stats',label:'Stats'},
  {id:'cms',label:'CMS'},
  {id:'settings',label:'Settings'},
  {id:'api',label:'API'},
  {id:'code',label:'Code'},
];
const SCREEN_COMPONENTS={
  lifestyle:LifestyleApp,
  shop:ShopApp,
  social:SocialApp,
  github:GitHubApp,
  chatbot:ChatbotApp,
  stats:StatsApp,
  cms:CMSApp,
  settings:SettingsApp,
  api:APIApp,
  code:CodeApp,
};

const App=()=>{
  const [kit,setKit]=React.useState('lifestyle');
  React.useEffect(()=>{lucide.createIcons();});
  const Comp=SCREEN_COMPONENTS[kit];
  const isDark=kit==='github'||kit==='code';
  return(
    <div>
      <div className="top-bar">
        <div className="wordmark">COZY<em>-</em>COOL <span style={{opacity:0.35,fontWeight:400,fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Mobile UI Kit</span></div>
        <div className="tab-row">{KITS.map(k=><button key={k.id} className={`tab ${kit===k.id?'active':''}`} onClick={()=>setKit(k.id)}>{k.label}</button>)}</div>
      </div>
      <div className="phones">
        <div className="phone-wrap"><div className="phone-label">Home</div><IOSDevice dark={isDark}><Comp/></IOSDevice></div>
        <div className="phone-wrap"><div className="phone-label">Detail</div><IOSDevice dark={isDark}><Comp/></IOSDevice></div>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
