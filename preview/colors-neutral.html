<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neutral Colors</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 24px; }
  .section { margin-bottom: 20px; }
  .section-label { font-size: 11px; font-weight: 700; color: #BDBDBD; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; }
  .swatch-group { flex: 1; }
  .swatch { height: 56px; border-radius: 6px; margin-bottom: 6px; border: 1px solid #f0f0f0; }
  .swatch-label { font-size: 11px; font-weight: 700; color: #333; }
  .swatch-hex { font-size: 11px; color: #828282; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Blacks</div>
    <div class="row">
      <div class="swatch-group">
        <div class="swatch" style="background:#000000;"></div>
        <div class="swatch-label">Black 1</div>
        <div class="swatch-hex">#000000</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#101010;"></div>
        <div class="swatch-label">Black 2</div>
        <div class="swatch-hex">#101010</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#282828;"></div>
        <div class="swatch-label">Black 3</div>
        <div class="swatch-hex">#282828</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#FFFFFF; border: 1px solid #e0e0e0;"></div>
        <div class="swatch-label">White</div>
        <div class="swatch-hex">#FFFFFF</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Greys</div>
    <div class="row">
      <div class="swatch-group">
        <div class="swatch" style="background:#333333;"></div>
        <div class="swatch-label">Gray 1</div>
        <div class="swatch-hex">#333333</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#4F4F4F;"></div>
        <div class="swatch-label">Gray 2</div>
        <div class="swatch-hex">#4F4F4F</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#828282;"></div>
        <div class="swatch-label">Gray 3</div>
        <div class="swatch-hex">#828282</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#BDBDBD;"></div>
        <div class="swatch-label">Gray 4</div>
        <div class="swatch-hex">#BDBDBD</div>
      </div>
      <div class="swatch-group">
        <div class="swatch" style="background:#E0E0E0;"></div>
        <div class="swatch-label">Gray 5</div>
        <div class="swatch-hex">#E0E0E0</div>
      </div>
    </div>
  </div>
</body>
</html>
