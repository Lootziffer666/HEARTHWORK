<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Headings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 10px 0; border-bottom: 1px solid #E0E0E0; }
  .row:last-child { border-bottom: none; }
  .specimen { flex: 1; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { display: flex; gap: 32px; flex-shrink: 0; }
  .meta-item { text-align: right; }
  .meta-label { font-size: 10px; color: #BDBDBD; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
  .meta-value { font-size: 12px; color: #828282; margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen" style="font-size:56px; line-height:61.6px;">Heading 1</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">56px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">61.6px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="specimen" style="font-size:48px; line-height:52.8px;">Heading 2</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">48px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">52.8px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="specimen" style="font-size:40px; line-height:44px;">Heading 3</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">40px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">44px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="specimen" style="font-size:32px; line-height:35.2px;">Heading 4</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">32px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">35.2px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="specimen" style="font-size:24px; line-height:26.4px;">Heading 5</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">24px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">26.4px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="specimen" style="font-size:20px; line-height:22px;">Heading 6</div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">20px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">22px</div></div>
    </div>
  </div>
</body>
</html>
