<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Body</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 20px 28px; }
  .row { display: flex; align-items: center; gap: 24px; padding: 9px 0; border-bottom: 1px solid #E0E0E0; }
  .row:last-child { border-bottom: none; }
  .pair { flex: 1; display: flex; gap: 24px; }
  .specimen-bold { font-weight: 700; color: #333; }
  .specimen-reg  { font-weight: 400; color: #4F4F4F; }
  .meta { display: flex; gap: 28px; flex-shrink: 0; }
  .meta-item { text-align: right; }
  .meta-label { font-size: 10px; color: #BDBDBD; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
  .meta-value { font-size: 11px; color: #828282; margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="pair">
      <span class="specimen-bold" style="font-size:20px;line-height:28px;">Large Bold</span>
      <span class="specimen-reg"  style="font-size:20px;line-height:28px;">Large Regular</span>
    </div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">20px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">28px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="pair">
      <span class="specimen-bold" style="font-size:18px;line-height:25.2px;">Medium Bold</span>
      <span class="specimen-reg"  style="font-size:18px;line-height:25.2px;">Medium Regular</span>
    </div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">18px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">25.2px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="pair">
      <span class="specimen-bold" style="font-size:16px;line-height:22.4px;">Normal Bold</span>
      <span class="specimen-reg"  style="font-size:16px;line-height:22.4px;">Normal Regular</span>
    </div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">16px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">22.4px</div></div>
    </div>
  </div>
  <div class="row">
    <div class="pair">
      <span class="specimen-bold" style="font-size:14px;line-height:19.6px;">Small Bold</span>
      <span class="specimen-reg"  style="font-size:14px;line-height:19.6px;">Small Regular</span>
    </div>
    <div class="meta">
      <div class="meta-item"><div class="meta-label">Size</div><div class="meta-value">14px</div></div>
      <div class="meta-item"><div class="meta-label">Line H</div><div class="meta-value">19.6px</div></div>
    </div>
  </div>
</body>
</html>
