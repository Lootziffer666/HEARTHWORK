<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii & Shadows</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f5f5f5; padding: 24px 28px; }
  .row { display: flex; gap: 20px; margin-bottom: 24px; }
  .item { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 8px; flex: 1; }
  .box { width: 64px; height: 40px; background: #0D2847; }
  .label { font-size: 11px; font-weight: 700; color: #333; text-align: center; }
  .sub { font-size: 10px; color: #828282; text-align: center; }
  .section-title { font-size: 10px; font-weight: 700; color: #BDBDBD; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="section-title">Border Radius</div>
  <div class="row">
    <div class="item" style="border-radius:4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
      <div class="box" style="border-radius:4px;"></div>
      <div class="label">Small</div>
      <div class="sub">4px — inputs, buttons, cards</div>
    </div>
    <div class="item" style="border-radius:4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
      <div class="box" style="border-radius:8px;"></div>
      <div class="label">Medium</div>
      <div class="sub">8px — modals, panels</div>
    </div>
    <div class="item" style="border-radius:4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
      <div class="box" style="border-radius:9999px; width:80px; height:24px;"></div>
      <div class="label">Pill</div>
      <div class="sub">9999px — toggles, tags</div>
    </div>
  </div>

  <div class="section-title">Shadows</div>
  <div class="row">
    <div class="item" style="border-radius:4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
      <div class="label">Card</div>
      <div class="sub">0 2px 8px rgba(0,0,0,0.08)</div>
    </div>
    <div class="item" style="border-radius:4px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);">
      <div class="label">Dropdown</div>
      <div class="sub">0 4px 16px rgba(0,0,0,0.12)</div>
    </div>
    <div class="item" style="border-radius:4px; box-shadow: 0 8px 32px rgba(0,0,0,0.16);">
      <div class="label">Modal</div>
      <div class="sub">0 8px 32px rgba(0,0,0,0.16)</div>
    </div>
  </div>
</body>
</html>
