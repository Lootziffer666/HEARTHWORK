<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>State Colors</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 24px; }
  .row { display: flex; gap: 16px; }
  .swatch-group { flex: 1; }
  .swatch { height: 80px; border-radius: 6px; margin-bottom: 10px; }
  .swatch-label { font-size: 12px; font-weight: 700; color: #333; letter-spacing: 0.04em; text-transform: uppercase; }
  .swatch-hex { font-size: 12px; color: #828282; margin-top: 2px; }
  .swatch-desc { font-size: 11px; color: #BDBDBD; margin-top: 2px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; color: #fff; margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch-group">
      <div class="swatch" style="background:#2F80ED;"></div>
      <div class="swatch-label">Info</div>
      <div class="swatch-hex">#2F80ED</div>
      <span class="tag" style="background:#2F80ED;">Info</span>
    </div>
    <div class="swatch-group">
      <div class="swatch" style="background:#27AE60;"></div>
      <div class="swatch-label">Success</div>
      <div class="swatch-hex">#27AE60</div>
      <span class="tag" style="background:#27AE60;">Success</span>
    </div>
    <div class="swatch-group">
      <div class="swatch" style="background:#E2B93B;"></div>
      <div class="swatch-label">Warning</div>
      <div class="swatch-hex">#E2B93B</div>
      <span class="tag" style="background:#E2B93B; color:#333;">Warning</span>
    </div>
    <div class="swatch-group">
      <div class="swatch" style="background:#EB5757;"></div>
      <div class="swatch-label">Error</div>
      <div class="swatch-hex">#EB5757</div>
      <span class="tag" style="background:#EB5757;">Error</span>
    </div>
  </div>
</body>
</html>
