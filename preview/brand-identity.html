<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand Identity</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 0; }
  .hero { background: #0D2847; display: flex; align-items: center; justify-content: center; padding: 32px 40px; gap: 24px; }
  .wordmark { font-size: 42px; font-weight: 900; color: #fff; letter-spacing: -0.02em; line-height: 1; }
  .wordmark span { color: #F2994A; }
  .tagline { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; }
  .divider { width: 1px; height: 60px; background: rgba(255,255,255,0.15); }
  .palette { display: flex; flex-direction: column; gap: 6px; }
  .palette-row { display: flex; gap: 4px; }
  .dot { width: 20px; height: 20px; border-radius: 50%; }

  .bottom { display: flex; align-items: stretch; gap: 0; }
  .panel { flex: 1; padding: 16px 20px; border-right: 1px solid #E0E0E0; }
  .panel:last-child { border-right: none; }
  .panel-label { font-size: 10px; font-weight: 700; color: #BDBDBD; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .font-specimen { font-size: 28px; font-weight: 700; color: #0D2847; line-height: 1; }
  .font-name { font-size: 12px; color: #828282; margin-top: 4px; }
  .voice-pill { display: inline-block; background: #f5f5f5; border-radius: 999px; padding: 4px 12px; font-size: 12px; color: #333; font-weight: 500; margin: 2px; }
</style>
</head>
<body>
  <div class="hero">
    <div>
      <div class="wordmark">COZY<span>-</span>COOL</div>
      <div class="tagline">UI Style Guidelines</div>
    </div>
    <div class="divider"></div>
    <div class="palette">
      <div class="palette-row">
        <div class="dot" style="background:#0D2847;" title="Primary"></div>
        <div class="dot" style="background:#F2994A;" title="Secondary"></div>
        <div class="dot" style="background:#2F80ED;" title="Info"></div>
        <div class="dot" style="background:#27AE60;" title="Success"></div>
        <div class="dot" style="background:#E2B93B;" title="Warning"></div>
        <div class="dot" style="background:#EB5757;" title="Error"></div>
      </div>
      <div class="palette-row">
        <div class="dot" style="background:#333333;"></div>
        <div class="dot" style="background:#4F4F4F;"></div>
        <div class="dot" style="background:#828282;"></div>
        <div class="dot" style="background:#BDBDBD;"></div>
        <div class="dot" style="background:#E0E0E0; border: 1px solid #ccc;"></div>
        <div class="dot" style="background:#fff; border: 1px solid #ccc;"></div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="panel">
      <div class="panel-label">Typeface</div>
      <div class="font-specimen">Inter</div>
      <div class="font-name">Google Fonts — 400, 700</div>
    </div>
    <div class="panel">
      <div class="panel-label">Voice</div>
      <div>
        <span class="voice-pill">Playful</span>
        <span class="voice-pill">Quirky</span>
        <span class="voice-pill">Professional</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Sign-off</div>
      <div style="font-size:14px; color:#333;">"Thank you for watching :)"</div>
      <div style="font-size:11px; color:#BDBDBD; margin-top:4px;">Warm, human, emoticon-friendly</div>
    </div>
  </div>
</body>
</html>
